<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #2d4a28;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    #sg-wrap {
      width: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #sg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #4a7c3f;
      padding: 10px 16px;
    }

    #sg-score-area { display: flex; align-items: center; gap: 22px; }

    .sg-stat {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .sg-stat-icon { font-size: 20px; }

    #sg-controls-row { display: flex; gap: 4px; }

    #sg-controls-row button {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    #sg-controls-row button:hover { background: rgba(255,255,255,0.2); }

    #sg-mode-bar {
      display: flex;
      gap: 6px;
      background: #3d6e34;
      padding: 7px 10px;
      flex-wrap: wrap;
    }

    .sg-mode-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sg-mode-btn:hover { background: rgba(255,255,255,0.28); }
    .sg-mode-btn.active { background: #fff; color: #3a6230; font-weight: 600; }

    #sg-canvas-wrap {
      border-left: 3px solid #4a7c3f;
      border-right: 3px solid #4a7c3f;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas { display: block; }

    #sg-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.62);
    }

    #sg-overlay h2 {
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      margin: 0 0 8px;
      text-align: center;
    }

    #sg-overlay p {
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      margin: 0 0 20px;
      text-align: center;
      max-width: 250px;
      line-height: 1.65;
      white-space: pre-line;
    }

    #sg-overlay button {
      background: #fff;
      color: #333;
      border: none;
      padding: 10px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #sg-overlay button:hover { background: #eee; transform: scale(1.03); }

    #sg-bottom {
      background: #4a7c3f;
      border-radius: 0 0 12px 12px;
      padding: 10px 12px 14px;
    }

    #sg-opts {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    #sg-opts label {
      color: #fff;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #sg-opts select {
      font-size: 12px;
      padding: 3px 7px;
      border-radius: 5px;
      border: none;
      background: #fff;
      color: #333;
      cursor: pointer;
    }

    #sg-dpad {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(3, 40px);
      gap: 5px;
      margin: 10px auto 0;
      width: fit-content;
    }

    .sg-db {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }

    .sg-db:hover  { background: rgba(255,255,255,0.32); }
    .sg-db:active { background: rgba(255,255,255,0.5); transform: scale(0.95); }
    .sg-de { width: 40px; height: 40px; }

    #sg-mode-desc {
      color: rgba(255,255,255,0.72);
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }

    @keyframes scoreFlash {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); color: #ffdd44; }
      100% { transform: scale(1); }
    }
    .flash { animation: scoreFlash 0.3s ease; }
  </style>
</head>
<body>

<div id="sg-wrap">

  <!-- Header -->
  <div id="sg-header">
    <div id="sg-score-area">
      <div class="sg-stat">
        <span class="sg-stat-icon">🍎</span>
        <span id="sg-score">0</span>
      </div>
      <div class="sg-stat">
        <span class="sg-stat-icon">🏆</span>
        <span id="sg-best">0</span>
      </div>
    </div>
    <div id="sg-controls-row">
      <button id="sg-sound-btn" title="Toggle sound">🔊</button>
      <button id="sg-pause-btn" title="Pause / Resume">⏸</button>
      <button id="sg-restart-btn" title="Restart">↺</button>
    </div>
  </div>

  <!-- Mode bar -->
  <div id="sg-mode-bar">
    <button class="sg-mode-btn active" data-mode="classic">Classic</button>
    <button class="sg-mode-btn" data-mode="borderless">Borderless</button>
    <button class="sg-mode-btn" data-mode="wall">Wall</button>
    <button class="sg-mode-btn" data-mode="dark">Dark</button>
    <button class="sg-mode-btn" data-mode="speedy">Speedy</button>
    <button class="sg-mode-btn" data-mode="maze">Maze</button>
  </div>

  <!-- Game canvas -->
  <div id="sg-canvas-wrap">
    <canvas id="sg-canvas"></canvas>
    <div id="sg-overlay">
      <h2 id="ov-title">Snake</h2>
      <p id="ov-msg">Use Arrow Keys or WASD to move.<br>Eat apples to grow!</p>
      <button id="sg-start-btn">▶ Play</button>
    </div>
  </div>

  <!-- Bottom controls -->
  <div id="sg-bottom">
    <div id="sg-opts">
      <label>Speed:
        <select id="sg-speed">
          <option value="200">Slow</option>
          <option value="130" selected>Normal</option>
          <option value="80">Fast</option>
          <option value="50">Blazing</option>
        </select>
      </label>
      <label>Apples:
        <select id="sg-apples">
          <option value="1" selected>1</option>
          <option value="3">3</option>
          <option value="5">5</option>
        </select>
      </label>
    </div>

    <!-- D-Pad -->
    <div id="sg-dpad">
      <div class="sg-de"></div>
      <button class="sg-db" id="btn-up">▲</button>
      <div class="sg-de"></div>
      <button class="sg-db" id="btn-left">◀</button>
      <div class="sg-de"></div>
      <button class="sg-db" id="btn-right">▶</button>
      <div class="sg-de"></div>
      <button class="sg-db" id="btn-down">▼</button>
      <div class="sg-de"></div>
    </div>

    <div id="sg-mode-desc">Classic: avoid walls and your own tail.</div>
  </div>

</div>

<script>
(function () {

  /* ── Constants ──────────────────────────────────────────── */
  const COLS = 17, ROWS = 17, CELL = 24;

  const canvas  = document.getElementById('sg-canvas');
  const ctx     = canvas.getContext('2d');
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  const overlay    = document.getElementById('sg-overlay');
  const ovTitle    = document.getElementById('ov-title');
  const ovMsg      = document.getElementById('ov-msg');
  const scoreEl    = document.getElementById('sg-score');
  const bestEl     = document.getElementById('sg-best');
  const pauseBtn   = document.getElementById('sg-pause-btn');
  const restartBtn = document.getElementById('sg-restart-btn');
  const startBtn   = document.getElementById('sg-start-btn');
  const soundBtn   = document.getElementById('sg-sound-btn');
  const speedSel   = document.getElementById('sg-speed');
  const applesSel  = document.getElementById('sg-apples');
  const modeDesc   = document.getElementById('sg-mode-desc');

  /* ── Mode Configs ───────────────────────────────────────── */
  const MODES = {
    classic:    { bg1:'#8ecc56', bg2:'#7ec04a', wc:'#4a7c3f', ac:'#e03030', sc:'#4a7cff', sh:'#3a6aee', desc:'Classic: avoid walls and your own tail.' },
    borderless: { bg1:'#a0d068', bg2:'#90c458', wc: null,     ac:'#e03030', sc:'#4a7cff', sh:'#3a6aee', desc:'Borderless: edges wrap around — no death from walls!' },
    wall:       { bg1:'#8ecc56', bg2:'#7ec04a', wc:'#8B4513', ac:'#e03030', sc:'#4a7cff', sh:'#3a6aee', desc:'Wall: each apple eaten spawns a new permanent brick!' },
    dark:       { bg1:'#1a2e1a', bg2:'#162612', wc:'#0a1a0a', ac:'#ff4444', sc:'#4488ff', sh:'#2266cc', desc:'Dark: same rules, darker atmosphere.' },
    speedy:     { bg1:'#56a0cc', bg2:'#4a94c0', wc:'#2a5a7c', ac:'#ffcc00', sc:'#ffffff', sh:'#dddddd', desc:'Speedy: snake speeds up with every apple eaten!' },
    maze:       { bg1:'#d4c9a8', bg2:'#c8bb98', wc:'#7a6a3a', ac:'#cc2222', sc:'#4a7cff', sh:'#3a6aee', desc:'Maze: navigate through fixed walls.' }
  };

  /* ── Audio ──────────────────────────────────────────────── */
  let soundOn  = true;
  let audioCtx = null;

  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function tone(type, freq, freqEnd, gainStart, duration, startDelay) {
    if (!soundOn) return;
    startDelay = startDelay || 0;
    try {
      const ac = getAudio();
      const o  = ac.createOscillator();
      const g  = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type;
      const t = ac.currentTime + startDelay;
      o.frequency.setValueAtTime(freq, t);
      if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
      g.gain.setValueAtTime(gainStart, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + duration);
      o.start(t);
      o.stop(t + duration + 0.01);
    } catch (e) {}
  }

  function playEat(score) {
    const base = 300 + Math.min(score * 8, 400);
    tone('square', base, base * 1.6, 0.18, 0.15);
  }

  function playMove() {
    tone('sine', 120, null, 0.04, 0.04);
  }

  function playWall() {
    tone('sawtooth', 200, 80, 0.12, 0.14);
  }

  function playDeath() {
    [400, 320, 240, 160].forEach(function(freq, i) {
      tone('sawtooth', freq, freq * 0.5, 0.2, 0.09, i * 0.1);
    });
  }

  function playStart() {
    [261, 329, 392, 523].forEach(function(freq, i) {
      tone('triangle', freq, null, 0.15, 0.12, i * 0.09);
    });
  }

  function playPause() {
    if (!soundOn) return;
    try {
      const ac = getAudio();
      const o  = ac.createOscillator();
      const g  = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(440, ac.currentTime);
      o.frequency.setValueAtTime(330, ac.currentTime + 0.08);
      g.gain.setValueAtTime(0.12, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
      o.start(ac.currentTime);
      o.stop(ac.currentTime + 0.19);
    } catch (e) {}
  }

  function playBestScore() {
    [523, 659, 784, 1046].forEach(function(freq, i) {
      tone('triangle', freq, null, 0.18, 0.14, i * 0.1);
    });
  }

  soundBtn.addEventListener('click', function() {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if (soundOn) playPause();
  });

  /* ── Game State ─────────────────────────────────────────── */
  var snake, dir, nextDir, apples, walls, wallSet;
  var score, best = 0, running = false, paused = false;
  var loop, mode = 'classic', baseSpeed = 130, stepCount = 0;

  function cellKey(x, y) { return x + ',' + y; }

  function occupied(x, y) {
    if (snake.some(function(s) { return s.x === x && s.y === y; })) return true;
    if (wallSet.has(cellKey(x, y))) return true;
    if (apples.some(function(a) { return a.x === x && a.y === y; })) return true;
    return false;
  }

  function spawnApple() {
    var x, y, t = 0;
    do {
      x = Math.floor(Math.random() * COLS);
      y = Math.floor(Math.random() * ROWS);
      t++;
    } while (occupied(x, y) && t < 400);
    if (t < 400) apples.push({ x: x, y: y });
  }

  function spawnWallBrick() {
    var x, y, t = 0;
    do {
      x = Math.floor(Math.random() * COLS);
      y = Math.floor(Math.random() * ROWS);
      t++;
    } while (occupied(x, y) && t < 400);
    if (t < 400) { walls.push([x, y]); wallSet.add(cellKey(x, y)); }
  }

  function buildMaze() {
    [
      [3,3],[3,4],[3,5],[3,6],[3,7],
      [13,9],[13,10],[13,11],[13,12],[13,13],
      [7,2],[8,2],[9,2],[10,2],
      [6,14],[7,14],[8,14],[9,14],[10,14],
      [2,8],[2,9],[2,10],
      [14,6],[14,7],[14,8]
    ].forEach(function(p) { walls.push(p); wallSet.add(cellKey(p[0], p[1])); });
  }

  function initGame() {
    var cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    snake   = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0; scoreEl.textContent = 0;
    walls   = []; wallSet = new Set(); apples = []; stepCount = 0;
    if (mode === 'maze') buildMaze();
    var n = parseInt(applesSel.value);
    for (var i = 0; i < n; i++) spawnApple();
  }

  /* ── Game Loop ──────────────────────────────────────────── */
  function step() {
    if (paused || !running) return;
    dir = { x: nextDir.x, y: nextDir.y };

    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (mode === 'borderless') {
      head.x = (head.x + COLS) % COLS;
      head.y = (head.y + ROWS) % ROWS;
    } else {
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        playDeath(); gameOver(); return;
      }
    }

    if (snake.some(function(s) { return s.x === head.x && s.y === head.y; })) {
      playDeath(); gameOver(); return;
    }
    if (wallSet.has(cellKey(head.x, head.y))) {
      playDeath(); gameOver(); return;
    }

    snake.unshift(head);
    stepCount++;
    if (stepCount % 4 === 0) playMove();

    var ai = -1;
    for (var i = 0; i < apples.length; i++) {
      if (apples[i].x === head.x && apples[i].y === head.y) { ai = i; break; }
    }

    if (ai >= 0) {
      apples.splice(ai, 1);
      score++;
      scoreEl.textContent = score;

      scoreEl.classList.remove('flash');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('flash');

      var isNewBest = score > best;
      if (isNewBest) { best = score; bestEl.textContent = best; playBestScore(); }
      else playEat(score);

      if (mode === 'wall')   { spawnWallBrick(); playWall(); }
      if (mode === 'speedy') {
        baseSpeed = Math.max(35, baseSpeed - 8);
        clearInterval(loop);
        loop = setInterval(step, baseSpeed);
      }
      spawnApple();
    } else {
      snake.pop();
    }
    draw();
  }

  /* ── Drawing ────────────────────────────────────────────── */
  function draw() {
    var m = MODES[mode];

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        ctx.fillStyle = (r + c) % 2 === 0 ? m.bg1 : m.bg2;
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
    }

    walls.forEach(function(w) {
      var wx = w[0], wy = w[1];
      if (mode === 'wall') {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(wx * CELL, wy * CELL, CELL, CELL);
        ctx.fillStyle = '#a0522d';
        ctx.fillRect(wx * CELL + 1, wy * CELL + 1, CELL - 2, CELL / 2 - 1);
        ctx.fillStyle = '#6b3410';
        ctx.fillRect(wx * CELL + 1, wy * CELL + CELL / 2, CELL - 2, CELL / 2 - 1);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.5;
        ctx.strokeRect(wx * CELL + 0.5, wy * CELL + 0.5, CELL - 1, CELL - 1);
        ctx.beginPath();
        ctx.moveTo(wx * CELL, wy * CELL + CELL / 2);
        ctx.lineTo(wx * CELL + CELL, wy * CELL + CELL / 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = m.wc || '#555';
        ctx.fillRect(wx * CELL, wy * CELL, CELL, CELL);
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(wx * CELL + 2, wy * CELL + 2, CELL - 4, CELL - 4);
      }
    });

    apples.forEach(function(a) { drawApple(a.x, a.y, m.ac); });

    snake.forEach(function(seg, i) {
      var isHead = i === 0;
      ctx.fillStyle = isHead ? m.sc : m.sh;
      rrect(seg.x * CELL + 2, seg.y * CELL + 2, CELL - 4, CELL - 4, isHead ? 6 : 4);
      ctx.fill();

      if (isHead) {
        var isDark = mode === 'dark';
        ctx.fillStyle = isDark ? '#aad4ff' : '#fff';
        var ex = dir.x, ey = dir.y, ox = dir.y, oy = -dir.x;
        var cx_ = seg.x * CELL + CELL / 2 + ex * 5;
        var cy_ = seg.y * CELL + CELL / 2 + ey * 5;
        ctx.beginPath(); ctx.arc(cx_ + ox * 4, cy_ + oy * 4, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx_ - ox * 4, cy_ - oy * 4, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(cx_ + ox * 4 + ex * 1.2, cy_ + oy * 4 + ey * 1.2, 1.8, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx_ - ox * 4 + ex * 1.2, cy_ - oy * 4 + ey * 1.2, 1.8, 0, Math.PI * 2); ctx.fill();
      }
    });
  }

  function drawApple(ax, ay, color) {
    var px = ax * CELL + CELL / 2, py = ay * CELL + CELL / 2;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(px, py + 1, CELL / 2 - 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.beginPath(); ctx.arc(px - 3, py - 3, 3, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#228822'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px + 1, py - CELL / 2 + 5);
    ctx.quadraticCurveTo(px + 6, py - CELL / 2, px + 5, py - CELL / 2 + 7);
    ctx.stroke();
    ctx.fillStyle = '#228822';
    ctx.beginPath(); ctx.ellipse(px + 3, py - CELL / 2 + 4, 4, 3, -0.4, 0, Math.PI * 2); ctx.fill();
  }

  function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  /* ── Game Over ──────────────────────────────────────────── */
  function gameOver() {
    running = false; clearInterval(loop);
    ovTitle.textContent = 'Game Over!';
    var msg = 'Score: ' + score + (score > 0 ? ' 🎉' : '');
    if (mode === 'wall')   msg += '\nBricks on board: ' + walls.length;
    if (mode === 'speedy') msg += '\nFinal speed: ' + baseSpeed + 'ms';
    ovMsg.textContent = msg;
    startBtn.textContent = '▶ Play Again';
    overlay.style.display = 'flex';
    pauseBtn.textContent = '⏸';
  }

  /* ── Start ──────────────────────────────────────────────── */
  function startGame() {
    overlay.style.display = 'none';
    running = true; paused = false;
    pauseBtn.textContent = '⏸';
    baseSpeed = parseInt(speedSel.value);
    initGame(); draw();
    clearInterval(loop);
    loop = setInterval(step, baseSpeed);
    playStart();
  }

  function resetToMenu() {
    clearInterval(loop); running = false;
    var parts = MODES[mode].desc.split(':');
    ovTitle.textContent = parts[0] + ' Mode';
    ovMsg.textContent = parts.slice(1).join(':').trim();
    startBtn.textContent = '▶ Play';
    overlay.style.display = 'flex';
    var m = MODES[mode];
    for (var r = 0; r < ROWS; r++)
      for (var c = 0; c < COLS; c++) {
        ctx.fillStyle = (r + c) % 2 === 0 ? m.bg1 : m.bg2;
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
  }

  /* ── Event Listeners ────────────────────────────────────── */
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', resetToMenu);

  pauseBtn.addEventListener('click', function() {
    if (!running) return;
    paused = !paused;
    pauseBtn.textContent = paused ? '▶' : '⏸';
    playPause();
    if (!paused) draw();
  });

  document.addEventListener('keydown', function(e) {
    var map = {
      ArrowUp:    { x: 0, y: -1 }, ArrowDown:  { x: 0,  y: 1 },
      ArrowLeft:  { x: -1, y: 0 }, ArrowRight: { x: 1,  y: 0 },
      w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
      a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
    };
    if (map[e.key]) {
      e.preventDefault();
      var nd = map[e.key];
      if (!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
    }
    if (e.key === ' ' && running) {
      paused = !paused;
      pauseBtn.textContent = paused ? '▶' : '⏸';
      playPause();
      if (!paused) draw();
    }
  });

  document.getElementById('btn-up').addEventListener('click',    function() { if (dir.y !==  1) nextDir = { x: 0,  y: -1 }; });
  document.getElementById('btn-down').addEventListener('click',  function() { if (dir.y !== -1) nextDir = { x: 0,  y:  1 }; });
  document.getElementById('btn-left').addEventListener('click',  function() { if (dir.x !==  1) nextDir = { x: -1, y:  0 }; });
  document.getElementById('btn-right').addEventListener('click', function() { if (dir.x !== -1) nextDir = { x:  1, y:  0 }; });

  document.querySelectorAll('.sg-mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.sg-mode-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      mode = btn.dataset.mode;
      modeDesc.textContent = MODES[mode].desc;
      resetToMenu();
    });
  });

  speedSel.addEventListener('change', function() {
    if (running && !paused) {
      clearInterval(loop);
      baseSpeed = parseInt(speedSel.value);
      loop = setInterval(step, baseSpeed);
    }
  });

  /* ── Initial board render ───────────────────────────────── */
  var m = MODES[mode];
  for (var r = 0; r < ROWS; r++)
    for (var c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? m.bg1 : m.bg2;
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }

})();
</script>
</body>
</html>
